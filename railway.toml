[build]
builder = "DOCKERFILE"

[deploy]
startCommand = "sh -c 'mkdir -p /data && chmod 777 /data && uvicorn app.main:app --host 0.0.0.0 --port $PORT'"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Volume for SQLite database persistence
[[services]]
name = "message-subscription"

[[services.volumes]]
name = "data"
mountPath = "/data"